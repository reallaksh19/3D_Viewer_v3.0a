name: Deploy viewer to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static viewer artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static viewer entrypoint
        run: node viewer/tests/app-entrypoint-static.test.js

      - name: Verify RVM viewer UI contracts
        run: node viewer/tests/rvm-viewer-ui-contract.test.js

      - name: Verify RVM PCF shared workflow and adapter checks
        run: |
          node viewer/tests/rvm-pcf-master-context.test.js
          node viewer/tests/rvm-pcf-shared-workflow-adapters.test.js
          node viewer/tests/rvm-pcf-row-enricher.test.js
          node viewer/tests/rvm-pcf-json-adapter-preview-run.test.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload viewer artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer

  deploy:
    name: Deploy Pages artifact
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
